<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Open Sans', sans-serif; background: #05070d; overflow-x: hidden; color: #111; }
    button { font-family: 'Open Sans', sans-serif; cursor: pointer; }
    img { display: block; }
    a { text-decoration: none; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f4f4f6; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* ── Keyframes ──────────────────────────────────────────────────────────── */
    @keyframes barScroll {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes badgePop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.45); }
      100% { transform: scale(1); }

    /* ── Utility classes ────────────────────────────────────────────────────── */
    .pp-fade        { animation: fadeUp 0.4s ease forwards; }
    .pp-badge-pop   { animation: badgePop 0.3s cubic-bezier(0.25,0.46,0.45,0.94); }
    .pp-thumb:hover { transform: scale(1.04); }
    .pp-flavor:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important; }
    .pp-faq-btn:hover { background: #fafafa; }

    /* ── Mobile carousel / nav ──────────────────────────────────────────────── */
    .pp-track { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .pp-track::-webkit-scrollbar { display: none; }

    .pp-nav-dropdown {
      position: absolute; top: 54px; left: 0; right: 0;
      background: #05070d; border-bottom: 1px solid rgba(255,255,255,0.08);
      overflow: hidden; max-height: 0; opacity: 0; z-index: 99;
      transition: max-height 0.28s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.22s;
    }
    .pp-nav-dropdown.open { max-height: 240px; opacity: 1; }

    .pp-faq-body {
      overflow: hidden; max-height: 0;
      transition: max-height 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .pp-faq-body.open { max-height: 320px; }
  </style>
</head>
<body>
  <div id="root"></div>

    window.ppFlavor = (id) => window.PP_FLAVORS.find(f => f.id === id);
  </script>

  <script type="text/babel">

    const FP = "'Poppins','Open Sans',sans-serif";
    const FA = "'Arimo','Open Sans',sans-serif";
    const FI = "'Inter','Open Sans',sans-serif";

    const FLAVORS  = window.PP_FLAVORS;

    const FAQS = [

      'Sin saborizantes artificiales','Solo 189 Calorías',
    ];

    const REVIEWS = [
      { name: 'Mariana R.', location: 'Lima, Perú',       rating: 5, date: 'hace 3 días',
        text: 'Llevaba meses buscando algo así. El de mango sabe increíble y no me cae pesado para nada. Ya pedí mi segundo 6-pack.' },
      { name: 'Carlos V.',  location: 'Miraflores, Lima',  rating: 5, date: 'hace 5 días',
        text: 'Finalmente una proteína sin lactosa que sabe bien. El chocolate criollo es mi favorito — se siente real, no artificial. 30G en 189 calorías es brutal.' },
      { name: 'Sofía M.',   location: 'San Isidro, Lima',  rating: 5, date: 'hace 1 semana',

    ];

    // ── Timer helpers ────────────────────────────────────────────────────────────
    function msDiff(end) {
      const s = Math.max(0, Math.floor((end - Date.now()) / 1000));
      return { h: Math.floor(s / 3600), m: Math.floor(s % 3600 / 60), s: s % 60 };
    }
    function initTimer() {
      try {
        const saved = JSON.parse(localStorage.getItem('pp_timer_end'));
        if (saved && saved > Date.now()) return msDiff(saved);
      } catch (_) {}
      const end = Date.now() + (23 * 3600 + 47 * 60 + 12) * 1000;
      try { localStorage.setItem('pp_timer_end', JSON.stringify(end)); } catch (_) {}
      return msDiff(end);
    }
    const pad = n => String(n).padStart(2, '0');

    // ── useIsMobile ──────────────────────────────────────────────────────────────
    function useIsMobile(breakpoint = 768) {
      const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
      const [isMobile, setIsMobile] = useState(mq.matches);
      useEffect(() => {
        const handler = e => setIsMobile(e.matches);
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, []);
      return isMobile;
    }

    // ── MQtyStepper (shared) ─────────────────────────────────────────────────────
    function MQtyStepper({ value, onChange, min = 1, height = 44 }) {
      return (
        <div style={{
          display: 'flex', alignItems: 'center',
          border: '1.5px solid #dcdce4', borderRadius: 14,
          background: '#fff', overflow: 'hidden',
          boxShadow: '0 1px 4px rgba(0,0,0,0.05)', height,
        }}>
          <button onClick={() => onChange(Math.max(min, value - 1))} style={{
            width: height, height, background: 'none', border: 'none',
            fontFamily: FO, fontWeight: 700, fontSize: 20, color: '#111',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>−</button>
          <span style={{
            width: 36, textAlign: 'center',
            fontFamily: FO, fontWeight: 700, fontSize: 16, color: '#111', userSelect: 'none',
          }}>{value}</span>
          <button onClick={() => onChange(value + 1)} style={{
            width: height, height, background: 'none', border: 'none',
            fontFamily: FO, fontWeight: 700, fontSize: 20, color: '#111',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>+</button>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════════
    // DESKTOP COMPONENTS
    // ════════════════════════════════════════════════════════════════════════════

    function ProductHeader({ cartCount, onCartClick }) {

      const [timeLeft, setTimeLeft] = useState(initTimer);
      const ctaRef = useRef(null);

      useEffect(() => {
        let end;
        try { end = JSON.parse(localStorage.getItem('pp_timer_end')); } catch (_) {}
        if (!end || end < Date.now()) {
          end = Date.now() + (23 * 3600 + 47 * 60 + 12) * 1000;
          try { localStorage.setItem('pp_timer_end', JSON.stringify(end)); } catch (_) {}
        }
        const id = setInterval(() => setTimeLeft(msDiff(end)), 1000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        if (!ctaRef.current) return;
        const obs = new IntersectionObserver(([e]) => setSticky(!e.isIntersecting), { threshold: 0 });
        obs.observe(ctaRef.current);
        return () => obs.disconnect();
      }, []);

      const cur   = FLAVORS.find(f => f.id === flavor);
      const price = window.ppMoney(PRICE * qty);

      function handleAdd() {
        setAdded(true);
        onAddToCart(flavor, qty);
        setTimeout(() => setAdded(false), 2400);
      }

      const D = { borderBottom: '1px solid #e8e8ec', marginBottom: 22, paddingBottom: 22 };

      return (
        <>

            position: 'fixed', top: 0, left: 0, right: 0, zIndex: 300,

            paddingBottom: 96,

            {/* Announcement bar */}
            <div style={{

              background: 'linear-gradient(90deg,#302f9b 0%,#6b3fa0 30%,#db5242 65%,#302f9b 100%)',
              backgroundSize: '200% 100%', animation: 'barScroll 8s linear infinite',

              color: '#fff', letterSpacing: '0.06em', textTransform: 'uppercase',

            <div style={{

    function MReviewsSection({ onScrollToProduct }) {
      const trackRef   = useRef(null);
      const pausedRef  = useRef(false);
      const resumeRef  = useRef(null);
      const [activeIdx, setActiveIdx] = useState(0);
      const reducedMotion = useRef(window.matchMedia('(prefers-reduced-motion: reduce)').matches);

      useEffect(() => {
        if (reducedMotion.current) return;
        let idx = 0;
        const id = setInterval(() => {
          if (pausedRef.current || !trackRef.current) return;
          idx = (idx + 1) % REVIEWS.length;
          trackRef.current.scrollTo({ left: idx * trackRef.current.offsetWidth, behavior: 'smooth' });
          setActiveIdx(idx);
        }, 4500);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        const track = trackRef.current;
        if (!track) return;
        const onScroll = () => {
          const w = track.offsetWidth;
          if (w) setActiveIdx(Math.round(track.scrollLeft / w));
        };
        track.addEventListener('scroll', onScroll, { passive: true });
        return () => track.removeEventListener('scroll', onScroll);
      }, []);

      function pauseAutoplay() {
        pausedRef.current = true;
        if (resumeRef.current) clearTimeout(resumeRef.current);
        resumeRef.current = setTimeout(() => { pausedRef.current = false; }, 5000);
      }

      function scrollToIdx(i) {
        pauseAutoplay(); setActiveIdx(i);
        if (trackRef.current) trackRef.current.scrollTo({ left: i * trackRef.current.offsetWidth, behavior: 'smooth' });
      }

      return (
        <section id="reviews" style={{ background: '#111', padding: '40px 0 44px' }}>
          <div style={{ padding: '0 16px' }}>
            <span style={{ fontFamily: FI, fontWeight: 700, fontSize: 11, color: 'rgba(255,255,255,0.35)', letterSpacing: '0.1em', textTransform: 'uppercase', display: 'block', marginBottom: 10 }}>Reseñas verificadas</span>

              <h2 style={{ fontFamily: FP, fontWeight: 800, fontSize: 28, color: '#f4f4f6', letterSpacing: '-0.04em', lineHeight: 1.05 }}>Lo que dicen<br/>los clientes</h2>
              <div style={{ textAlign: 'right', flexShrink: 0 }}>

                  {[0,1,2,3,4].map(i => (<svg key={i} width="12" height="12" viewBox="0 0 24 24" fill="#db5242"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>))}

                <div style={{ fontFamily: FO, fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>de 237 reseñas</div>
              </div>
            </div>

            <div ref={trackRef} className="pp-track" onTouchStart={pauseAutoplay} onPointerDown={pauseAutoplay}
              style={{ display: 'flex', overflowX: 'auto', scrollSnapType: 'x mandatory' }}>
              {REVIEWS.map((r, i) => (
                <div key={i} style={{ flex: '0 0 100%', scrollSnapAlign: 'center', padding: '0 1px' }}>
                  <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, border: '1px solid rgba(255,255,255,0.08)', padding: '24px 20px 22px', display: 'flex', flexDirection: 'column', gap: 14 }}>
                    <div style={{ display: 'flex', gap: 2 }}>
                      {[0,1,2,3,4].map(j => (<svg key={j} width="14" height="14" viewBox="0 0 24 24" fill={j < r.rating ? '#db5242' : 'rgba(255,255,255,0.15)'}><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>))}
                    </div>
                    <p style={{ fontFamily: FO, fontSize: 14, lineHeight: 1.7, color: 'rgba(255,255,255,0.75)', margin: 0 }}>"{r.text}"</p>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div>
                        <div style={{ fontFamily: FO, fontWeight: 700, fontSize: 13, color: '#f4f4f6', letterSpacing: '-0.02em' }}>{r.name}</div>
                        <div style={{ fontFamily: FO, fontSize: 11, color: 'rgba(255,255,255,0.3)', marginTop: 2 }}>{r.location}</div>

                  </div>
                </div>
              ))}
            </div>

            <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 20, marginBottom: 28 }}>
              {REVIEWS.map((_, i) => (
                <button key={i} onClick={() => scrollToIdx(i)} aria-label={`Reseña ${i + 1}`} style={{
                  width: activeIdx === i ? 24 : 8, height: 8, borderRadius: 4, border: 'none',

                  {cartItems.map(item => {
                    const f = FLAVORS.find(fl => fl.id === item.id);
                    if (!f) return null;
                    return (
                      <div key={item.id} style={{ display: 'flex', gap: 12, alignItems: 'center', padding: '12px', borderRadius: 14, background: '#fafafa', border: '1px solid #f0f0f4' }}>
                        <div style={{ width: 56, height: 56, borderRadius: 10, background: '#f4f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                          <img src={f.img} alt={f.label} style={{ height: 48, width: 'auto', objectFit: 'contain' }} />
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontFamily: FO, fontWeight: 700, fontSize: 13, color: '#111', marginBottom: 2, letterSpacing: '-0.02em' }}>{f.label}</div>
                          <div style={{ fontFamily: FO, fontSize: 11, color: '#999', marginBottom: 8 }}>6 Pack · 30G</div>
                          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <MQtyStepper value={item.qty} onChange={v => onUpdateQty(item.id, v)} height={36} />
                            <div style={{ textAlign: 'right' }}>
                              <div style={{ fontFamily: FA, fontWeight: 700, fontSize: 15, color: '#111' }}>{window.ppMoney(PRICE * item.qty)}</div>
                              <button onClick={() => onRemove(item.id)} style={{ background: 'none', border: 'none', fontFamily: FO, fontSize: 11, color: '#db5242', padding: '4px 0' }}>Eliminar</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {cartItems.length > 0 && (
              <div style={{ flexShrink: 0, padding: `16px 20px calc(16px + env(safe-area-inset-bottom, 0px))`, borderTop: '1px solid #f0f0f4' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
                  <span style={{ fontFamily: FO, fontSize: 14, color: '#555' }}>Subtotal</span>
                  <span style={{ fontFamily: FA, fontWeight: 700, fontSize: 22, color: '#111', letterSpacing: '-0.03em' }}>{window.ppMoney(subtotal)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                  <span style={{ fontFamily: FO, fontSize: 13, color: '#555' }}>Envío</span>
                  <span style={{ fontFamily: FO, fontWeight: 700, fontSize: 13, color: '#302f9b' }}>Gratis</span>
                </div>
                <button style={{ width: '100%', height: 54, borderRadius: 16, border: 'none', background: 'linear-gradient(180deg,#e3796c 0%,#db5242 38%,#302f9b 100%)', fontFamily: FP, fontWeight: 800, fontSize: 15, letterSpacing: '-0.01em', color: '#fff', textTransform: 'uppercase', boxShadow: '0 8px 24px rgba(219,82,66,0.36)', marginBottom: 12 }}>FINALIZAR COMPRA</button>
                <button onClick={onClose} style={{ width: '100%', background: 'none', border: 'none', fontFamily: FO, fontSize: 14, color: '#555', padding: '6px 0' }}>Seguir comprando</button>
              </div>
            )}
          </div>
        </>
      );
    }

    // ════════════════════════════════════════════════════════════════════════════
    // APP ROOT
    // ════════════════════════════════════════════════════════════════════════════

    function App() {
      const isMobile = useIsMobile();

      // Shared state
      const [flavor,     setFlavor]     = useState('combinado');
      const [qty,        setQty]        = useState(1);
      const [cartItems,  setCartItems]  = useState([]);
      const [cartOpen,   setCartOpen]   = useState(false);
      const [ctaVisible, setCtaVisible] = useState(true);

      const cartCount = cartItems.reduce((s, it) => s + it.qty, 0);

      const handleAddToCart = useCallback((flavorId, qtyToAdd) => {
        setCartItems(items => {
          const existing = items.find(it => it.id === flavorId);
          if (existing) return items.map(it => it.id === flavorId ? { ...it, qty: it.qty + qtyToAdd } : it);
          return [...items, { id: flavorId, qty: qtyToAdd }];
        });
        setCartOpen(true);
      }, []);

      const handleUpdateQty = useCallback((id, v) => {
        if (v < 1) return;
        setCartItems(items => items.map(it => it.id === id ? { ...it, qty: v } : it));
      }, []);

      const handleRemove = useCallback(id => {
        setCartItems(items => items.filter(it => it.id !== id));
      }, []);

      function scrollToProduct() {
        document.getElementById('product-section')?.scrollIntoView({ behavior: 'smooth' });
      }

      const footer = (
        <footer style={{
          background: '#05070d', borderTop: '1px solid rgba(255,255,255,0.07)',
          padding: isMobile ? '28px 20px' : '28px 48px',
          display: 'flex', alignItems: 'center', justifyContent: isMobile ? 'center' : 'space-between',
          flexDirection: isMobile ? 'column' : 'row', gap: isMobile ? 12 : 0,
        }}>
          <span style={{ fontFamily: FP, fontWeight: 800, fontSize: isMobile ? 22 : 20, letterSpacing: '-0.05em', color: '#f4f4f6' }}>perfect pal</span>
          <div style={{ display: 'flex', gap: isMobile ? 20 : 32, flexWrap: 'wrap', justifyContent: 'center' }}>
            {[{l:'Tienda',h:'#'},{l:'Proteína 101',h:'#'},{l:'Calculadora',h:'calculadora.html'},{l:'Contacto',h:'#'}].map(({l,h}) => (
              <a key={l} href={h} style={{ fontFamily: FO, fontSize: 13, color: 'rgba(255,255,255,0.4)' }}
                onMouseEnter={e => e.target.style.color = 'rgba(255,255,255,0.8)'}
                onMouseLeave={e => e.target.style.color = 'rgba(255,255,255,0.4)'}
              >{l}</a>
            ))}
          </div>
          <span style={{ fontFamily: FO, fontSize: 11, color: 'rgba(255,255,255,0.2)' }}>© 2025 perfect pal · Hecho con ❤️ en Lima, Perú</span>
        </footer>
      );

      if (isMobile) {
        return (
          <div>
            <MProductHeader cartCount={cartCount} onCartClick={() => setCartOpen(true)} />
            <MProductSection
              flavor={flavor} setFlavor={setFlavor}
              qty={qty} setQty={setQty}
              onAddToCart={handleAddToCart}
              onCtaVisibilityChange={setCtaVisible}
            />
            <MReviewsSection onScrollToProduct={scrollToProduct} />
            {footer}
            <div style={{ height: 92 }} />
            <MBottomBar
              flavor={flavor} qty={qty}
              ctaVisible={ctaVisible} cartOpen={cartOpen}
              onAdd={() => handleAddToCart(flavor, qty)}
            />
            <MobileCart
              cartItems={cartItems} cartOpen={cartOpen}
              onClose={() => setCartOpen(false)}
              onUpdateQty={handleUpdateQty}
              onRemove={handleRemove}
              onScrollToProduct={scrollToProduct}
            />
          </div>
        );
      }

      return (
        <div>
          <ProductHeader cartCount={cartCount} onCartClick={() => setCartOpen(true)} />
          <div id="product-section">
            <ProductSection onAddToCart={handleAddToCart} />
          </div>
          <ReviewsSection onScrollToProduct={scrollToProduct} />
          {footer}
          <MobileCart
            cartItems={cartItems} cartOpen={cartOpen}
            onClose={() => setCartOpen(false)}
            onUpdateQty={handleUpdateQty}
            onRemove={handleRemove}
            onScrollToProduct={scrollToProduct}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
